<div class="hero">
	<div class="hero-glow"></div>

	<div class="brand">
		<h1>RIFT <span>PARTY</span></h1>
		<p>Choisis ton nouveau mot de passe.</p>
	</div>

	<div class="card panel">
		@if (!hasToken()) {
			<p class="error">
				Ce lien est incomplet. Ouvre le lien recu par email, ou refais une demande de
				reinitialisation depuis la page de connexion.
			</p>
			<a class="btn btn-primary submit" routerLink="/login">Retour a la connexion</a>
		} @else {
			<div class="field">
				<label>Nouveau mot de passe</label>
				<input
					class="input"
					type="password"
					[(ngModel)]="password"
					placeholder="8 caracteres minimum"
					(keyup.enter)="submit()"
				/>
			</div>
			<div class="field">
				<label>Confirme le mot de passe</label>
				<input
					class="input"
					type="password"
					[(ngModel)]="passwordConfirm"
					placeholder="Les memes 8 caracteres (ou plus)"
					(keyup.enter)="submit()"
				/>
			</div>

			@if (error(); as err) {
				<p class="error">{{ err }}</p>
			}

			<button class="btn btn-primary submit" [disabled]="!canSubmit()" (click)="submit()">
				{{ loading() ? "..." : "Changer mon mot de passe" }}
			</button>
		}
	</div>
</div>
