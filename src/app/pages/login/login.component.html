<div class="hero">
	<div class="hero-glow"></div>

	<div class="brand">
		<h1>RIFT <span>PARTY</span></h1>
		<p>Un compte optionnel, juste pour garder ton abonnement d'une session a l'autre.</p>
	</div>

	<div class="card panel">
		<div class="tabs">
			<button class="tab" [class.active]="mode() === 'login'" (click)="mode.set('login')">
				Connexion
			</button>
			<button class="tab" [class.active]="mode() === 'register'" (click)="mode.set('register')">
				Creer un compte
			</button>
		</div>

		<div class="field">
			<label>Email</label>
			<input
				class="input"
				type="email"
				[(ngModel)]="email"
				placeholder="toi@example.com"
				(keyup.enter)="submit()"
			/>
		</div>
		<div class="field">
			<label>Mot de passe</label>
			<input
				class="input"
				type="password"
				[(ngModel)]="password"
				placeholder="8 caracteres minimum"
				(keyup.enter)="submit()"
			/>
		</div>

		@if (error(); as err) {
			<p class="error">{{ err }}</p>
		}

		<button class="btn btn-primary submit" [disabled]="!canSubmit()" (click)="submit()">
			{{ loading() ? "..." : mode() === "register" ? "Creer mon compte" : "Se connecter" }}
		</button>
	</div>

	<app-ad-slot [minHeight]="250" />
</div>
