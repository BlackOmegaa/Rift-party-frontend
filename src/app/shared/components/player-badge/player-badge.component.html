<div class="player-badge" [class.me]="isMe()" [class.supporter]="player().isSubscriber">
  <span class="dot" [class.offline]="!player().connected"></span>
  @if (player().isSubscriber) {
    <app-icon name="crown" [size]="12" class="supporter-crown" />
  }
  <span class="pseudo">{{ player().pseudo }}</span>
  @if (player().isHost) {
    <span class="badge badge-gold">Host</span>
  }
  <span class="score">{{ player().score }} pts</span>
</div>
