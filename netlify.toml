# Config de build Netlify : prime sur les reglages saisis dans l'UI.
# `npm run build` (et non `ng build` : le CLI Angular n'est pas installe
# globalement sur les runners Netlify, il vient de node_modules).
[build]
  command = "npm run build"
  publish = "dist/rift-party-frontend/browser"

# NODE_ENV=production ferait sauter les devDependencies (dont @angular/cli,
# d'ou "ng: not found") lors du npm install des runners Netlify. Le build
# Angular reste bien en configuration production (angular.json defaultConfiguration).
[build.environment]
  NODE_ENV = "development"
